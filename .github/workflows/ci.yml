name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: |
          if ! npm ci; then
            echo "npm ci failed, running npm install to fix lock file"
            npm install
            if git diff --quiet package-lock.json; then
              echo "Lock file is in sync now"
            else
              echo "❌ ERROR: package-lock.json was out of sync with package.json"
              echo "The lock file has been regenerated. Please run 'npm install' locally and commit the updated package-lock.json"
              git diff package-lock.json
              exit 1
            fi
          fi

      - name: Run linter
        run: npm run lint || true

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload coverage reports (if available)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
